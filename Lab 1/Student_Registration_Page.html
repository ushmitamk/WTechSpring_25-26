<!DOCTYPE html>
<html lang="eng">

<head>
    <title>Student Registration Page</title>
</head>

<body>
    <h1> Student Registration Page </h1>
<form>
    <lable for="StudentName">Student Name:</lable>
    <input type="text" id="StudentName" name="StudentName" placeholder="Enter Your Name">
    <br><br>

    <lable for ="StudentCGPA">Stuent CGPA:</lable>
    <input type="text" id="StudentCGPA" name="StudentCGPA" placeholder="Enter Your CGPA">
    <br><br>

    <lable for="GenderMale">Male:</lable>
    <input type ="radio" id="GenderMale" name="Gender" value="Male">
    <br><br>

    <lable for="GenderFemale">Female:</lable>
    <input type ="radio" id="GenderFemale" name="Gender" value="Female">
    <br><br>

<label for="StudentDept">Select Department:</label>
<select>
    <option value="CSE">CSE</option> 
    <option value="EEE">EEE</option>
    <option value="BBA">BBA</option>
    <option value="ENGLISH">ENGLISH</option>
    <option value="LAW">LAW</option>
</select>
<br><br>

<label for="StudentId">Student ID:</label>
<input type="text" id="id" name="id">
<br><br>

<label for="Address">Address:</label>
<textarea id="Address" name="Address" row="4" cols="25" placeholder="Enter your address here"></textarea>
    <br><br>

<label for="DOB">Date of Birth:</label>
<input type="date" id="DOB" name="DOB">
<br><br>

<label for="email">Email:</label>
<input type="email" id="email" name="email" placeholder="Enter your email">
<br><br>

<label for="InsertFile">Upload your Grade Report:</label>
<input type="file" id="InsertFile" name="InsertFile">
<br><br>

<label for="Agree">I agree to the terms and conditions</label>
<input type="checkbox" id="Agree" name="Agree">
<br><br>

<label for="Phone">Phone Number:</label>
<input type="text" id="Phone" name="Phone" placeholder= "Enter your phone number">
<br><br>

<label for="SubmitInfo">Submit your information</label>
<br><br>
<input type="submit" id="SubmitInfo" name="SubmitInfo">
<br><br>

</form>
</body>
</html>
